      <stop offset="0%" stop-color="#EAF7FF"/>
      <stop offset="55%" stop-color="#CDEAFB"/>
      <stop offset="100%" stop-color="#9ED6F2"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4C8AD0"/>
      <stop offset="100%" stop-color="#1C4C82"/>
