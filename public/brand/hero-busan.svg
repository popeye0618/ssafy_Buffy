    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFDFB0" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#FFDFB0" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="headClip"><circle cx="480" cy="80" r="140"/></clipPath>
  </defs>

  <!-- 하늘 -->
  <rect width="960" height="540" fill="url(#sky)"/>
